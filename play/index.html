<!DOCTYPE html>
<head>
    <title>Play</title>
    <link rel="stylesheet" href="../css/style.css">
    <style>
        #canvasContainer {
            position: relative;
        }

        #myCanvas {
            display: block;
        }

        #accuracyDisplay {
            font-weight: bold;
            color: #2e7d32;
        }
    </style>
</head>

<div id="header"></div>

<script>
    fetch("../header.html")
        .then(response => response.text())
        .then(data => {
            document.getElementById("header").innerHTML = data;
        });
</script>

<div class="gameLayout">
    <div id="canvasContainer">
        <canvas id="myCanvas"
            style="border:5px solid #b8c1ec; background-color: #969696;">
        </canvas>
    </div>

    <div class="infoPanel">
        <h2>Instructions</h2>
        <p>Click the shape that changed.</p>
        <p id="roundDisplay">Round: 1</p>
        <p id="accuracyDisplay">Accuracy: 0%</p>
        <p id="streakDisplay">Current streak: 0</p>
        <p id="maxStreakDisplay">Best streak: 0</p>
    </div>

</div>

<script src="../js/game.js"></script>

</html>
